<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arduino Shift Light Simulator</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-color: #1e1e1e;
            --accent-color: #00ff66;
            --led-off: #2a2a2a;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 5px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #888;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        /* Hardware Console Container */
        .console {
            background-color: var(--panel-color);
            border: 4px solid #333;
            border-radius: 16px;
            padding: 30px;
            width: 700px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        /* LED Strip Visualizer */
        .led-strip-container {
            background: #0d0d0d;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
            border: 2px solid #222;
        }

        .led-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 30px;
        }

        .led {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: var(--led-off);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
            transition: background-color 0.05s ease, box-shadow 0.05s ease;
        }

        .led-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 10px;
            color: #666;
            font-family: monospace;
            padding: 0 2px;
        }

        /* Interface Midsection */
        .mid-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        /* Alphanumeric Display */
        .display-panel {
            background: #050505;
            border: 3px solid #222;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            height: 120px;
        }

        .alpha4-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 3.5rem;
            font-weight: bold;
            color: #ff3333;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.6), 0 0 20px rgba(255, 51, 51, 0.3);
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .display-label {
            font-size: 0.75rem;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* Physical Controls (Encoder/Button) */
        .control-panel {
            background: #181818;
            border-radius: 8px;
            border: 1px solid #333;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .encoder-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .encoder-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #444, #222);
            border: 3px solid #555;
            color: white;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        .encoder-btn:active {
            transform: scale(0.92);
            background: linear-gradient(135deg, #222, #111);
        }

        .rotary-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .rot-btn {
            background: #333;
            border: 1px solid #555;
            color: white;
            padding: 5px 10px;
            font-family: monospace;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .rot-btn:active {
            background: #555;
        }

        /* Slider / Tacho Section */
        .tacho-panel {
            background: #181818;
            border-radius: 8px;
            border: 1px solid #333;
            padding: 20px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #bbb;
        }

        .rpm-slider {
            width: 100%;
            -webkit-appearance: none;
            background: #333;
            height: 8px;
            border-radius: 5px;
            outline: none;
        }

        .rpm-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            box-shadow: 0 0 8px rgba(0, 255, 102, 0.8);
        }

        /* Debug / Serial Monitor Panel */
        .serial-monitor {
            margin-top: 20px;
            background: #000;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            color: #00ff66;
            height: 80px;
            overflow-y: auto;
            text-align: left;
        }
    </style>
</head>
<body>

    <h1>Shift Light Harness Simulator</h1>
    <div class="subtitle">Simulating your Arduino code directly in the browser</div>

    <div class="console">
        <div class="led-strip-container">
            <div class="led-strip" id="ledStrip">
                </div>
            <div class="led-labels">
                <span>Pixel 0</span>
                <span>Pixel 11</span>
                <span>Pixel 12</span>
                <span>Pixel 23</span>
            </div>
        </div>

        <div class="mid-section">
            <div class="display-panel">
                <div class="alpha4-display" id="alphaDisplay">BOOT</div>
                <div class="display-label">Alpha4 Alphanumeric</div>
            </div>

            <div class="control-panel">
                <div class="encoder-wrapper">
                    <span style="font-size: 12px; margin-bottom: 8px; color: #888;">ENCODER DIAL</span>
                    <div class="rotary-buttons">
                        <button class="rot-btn" id="rotCw" title="Rotate Clockwise (Encoder Right)">↻ CW</button>
                        <button class="rot-btn" id="rotCcw" title="Rotate Counter-Clockwise (Encoder Left)">↺ CCW</button>
                    </div>
                </div>
                <div class="encoder-wrapper">
                    <span style="font-size: 12px; margin-bottom: 8px; color: #888;">PUSH BUTTON</span>
                    <button class="encoder-btn" id="pushBtn" title="Press Rotary Encoder Button">●</button>
                </div>
            </div>
        </div>

        <div class="tacho-panel">
            <div class="slider-header">
                <span>Engine Speed Simulator (Tach Pin)</span>
                <span id="rpmValue">1000 RPM</span>
            </div>
            <input type="range" min="0" max="9500" value="1000" class="rpm-slider" id="rpmSlider">
        </div>

        <div class="serial-monitor" id="serialOut">
            --- Serial Console Initialized (115200 Baud) ---<br>
        </div>
    </div>

    <script>
        // --- FIRMWARE / SYSTEM VARIABLES (Matching your INO definitions) ---
        const CONFIG_VERSION = "ls1";
        let Settings = {
            version: CONFIG_VERSION,
            brightness: 0x7F, // 127
            enable_rpm: 3500,
            shift_rpm: 7500,
            color_primary: 0x50,
            color_secondary: 0x38,
            color_tertiary: 0x0C,
            color_shift_primary: 0xFC,
            color_shift_secondary: 0xE0
        };

        const numPixels = 24;
        let displaybuffer = "BOOT";
        let clickCounter = 0;
        let clickCounterLast = 0;
        let fakeRpmCounter = 1000; // Simulated internally
        
        let menuState = false;
        let setItemState = false;
        let prevSetItemState = false;
        let menuPos = 0;
        let lastMenuPos = -1;
        
        let rpm = 1000;
        let fakeRPM = false;
        let displayStyle = 0; // 0 for dot, 1 for bar, 2 for Center-out
        let tachDisplay = true;

        let shiftFlashTime = 0;
        let shiftFlashState = false;
        let lastDisplayedRpm = 0xFFFF;

        // --- DOM ELEMENTS ---
        const ledStrip = document.getElementById('ledStrip');
        const alphaDisplay = document.getElementById('alphaDisplay');
        const rpmSlider = document.getElementById('rpmSlider');
        const rpmValue = document.getElementById('rpmValue');
        const pushBtn = document.getElementById('pushBtn');
        const rotCw = document.getElementById('rotCw');
        const rotCcw = document.getElementById('rotCcw');
        const serialOut = document.getElementById('serialOut');

        // Init 24 LED DOM elements
        for (let i = 0; i < numPixels; i++) {
            const led = document.createElement('div');
            led.classList.add('led');
            led.id = `led-${i}`;
            ledStrip.appendChild(led);
        }

        // --- CORE HELPER FUNCTIONS ---
        function writeSerial(msg) {
            serialOut.innerHTML += msg + "<br>";
            serialOut.scrollTop = serialOut.scrollHeight;
        }

        // Adafruit Neopixel Wheel function
        function Wheel(WheelPos) {
            WheelPos = 255 - WheelPos;
            if (WheelPos < 6) {
                return { r: 255, g: 255, b: 255 };
            } else if (WheelPos > 250) {
                return { r: 0, g: 0, b: 0 };
            } else if (WheelPos < 85) {
                return { r: 255 - WheelPos * 3, g: 0, b: WheelPos * 3 };
            } else if (WheelPos < 170) {
                WheelPos -= 85;
                return { r: 0, g: WheelPos * 3, b: 255 - WheelPos * 3 };
            } else {
                WheelPos -= 170;
                return { r: WheelPos * 3, g: 255 - WheelPos * 3, b: 0 };
            }
        }

        // Apply visual updates to DOM LED strips based on hex values
        function setPixelColor(index, colorObj) {
            const led = document.getElementById(`led-${index}`);
            if (led) {
                // Calculate scale ratio matching Settings.brightness
                const factor = Settings.brightness / 255;
                const r = Math.round(colorObj.r * factor);
                const g = Math.round(colorObj.g * factor);
                const b = Math.round(colorObj.b * factor);
                
                if (r === 0 && g === 0 && b === 0) {
                    led.style.backgroundColor = 'var(--led-off)';
                    led.style.boxShadow = 'inset 0 2px 4px rgba(0,0,0,0.6)';
                } else {
                    led.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
                    led.style.boxShadow = `0 0 12px rgb(${r}, ${g}, ${b})`;
                }
            }
        }

        function blackout() {
            for (let i = 0; i < numPixels; i++) {
                setPixelColor(i, {r:0, g:0, b:0});
            }
        }

        // --- SIMULATED ARDUINO FIRMWARE LOOP (runs at high speed) ---
        function loop() {
            // Read simulated hardware values
            if (fakeRPM) {
                rpm = fakeRpmCounter;
            } else {
                rpm = parseInt(rpmSlider.value);
            }

            // Execute the light processing pipeline
            lightItUp();

            // Screen/Interface Logic
            if (!menuState) {
                tachDisplay = true;
                if (rpm !== lastDisplayedRpm) {
                    lastDisplayedRpm = rpm;
                    displaybuffer = String(rpm).padStart(4, '0');
                    updateAlphaDisplay();
                }
            } else if (menuState && !setItemState) {
                lastDisplayedRpm = 0xFFFF;
                tachDisplay = false;

                if (clickCounter > clickCounterLast) {
                    if (menuPos < 11) menuPos++;
                    clickCounterLast = clickCounter;
                } else if (clickCounter < clickCounterLast) {
                    if (menuPos > 0) menuPos--;
                    clickCounterLast = clickCounter;
                }
            } else if (menuState && setItemState) {
                lastDisplayedRpm = 0xFFFF;
                
                switch (menuPos) {
                    case 1: // brightness
                        if (clickCounter > clickCounterLast) {
                            if (Settings.brightness < 240) Settings.brightness += 16;
                        } else if (clickCounter < clickCounterLast) {
                            if (Settings.brightness > 16) Settings.brightness -= 16;
                        }
                        if (Settings.brightness < 8) Settings.brightness = 252;
                        if (Settings.brightness > 252) Settings.brightness = 8;
                        clickCounterLast = clickCounter;
                        displaybuffer = String(Settings.brightness).padStart(4, '0');
                        updateAlphaDisplay();
                        colorFill(Wheel(Settings.color_primary));
                        break;
                    case 2: // enable rpm
                        if (clickCounter > clickCounterLast && Settings.enable_rpm <= Settings.shift_rpm - 200) {
                            Settings.enable_rpm += 100;
                        } else if (clickCounter < clickCounterLast && Settings.enable_rpm > 1500) {
                            Settings.enable_rpm -= 100;
                        }
                        clickCounterLast = clickCounter;
                        displaybuffer = String(Settings.enable_rpm).padStart(4, '0');
                        updateAlphaDisplay();
                        break;
                    case 3: // shift rpm
                        if (clickCounter > clickCounterLast && Settings.shift_rpm < 9000) {
                            Settings.shift_rpm += 100;
                        } else if (clickCounter < clickCounterLast && Settings.shift_rpm > Settings.enable_rpm) {
                            Settings.shift_rpm -= 100;
                        }
                        clickCounterLast = clickCounter;
                        displaybuffer = String(Settings.shift_rpm).padStart(4, '0');
                        updateAlphaDisplay();
                        break;
                    case 4: // color 1
                        if (clickCounter > clickCounterLast) Settings.color_primary += 4;
                        else if (clickCounter < clickCounterLast) Settings.color_primary -= 4;
                        clickCounterLast = clickCounter;
                        displaybuffer = String(Settings.color_primary).padStart(4, '0');
                        updateAlphaDisplay();
                        colorFill(Wheel(Settings.color_primary));
                        break;
                    case 5: // color 2
                        if (clickCounter > clickCounterLast) Settings.color_secondary += 4;
                        else if (clickCounter < clickCounterLast) Settings.color_secondary -= 4;
                        clickCounterLast = clickCounter;
                        displaybuffer = String(Settings.color_secondary).padStart(4, '0');
                        updateAlphaDisplay();
                        colorFill(Wheel(Settings.color_secondary));
                        break;
                    case 6: // color 3
                        if (clickCounter > clickCounterLast) Settings.color_tertiary += 4;
                        else if (clickCounter < clickCounterLast) Settings.color_tertiary -= 4;
                        clickCounterLast = clickCounter;
                        displaybuffer = String(Settings.color_tertiary).padStart(4, '0');
                        updateAlphaDisplay();
                        colorFill(Wheel(Settings.color_tertiary));
                        break;
                    case 7: // shift color 1
                        if (clickCounter > clickCounterLast) Settings.color_shift_primary += 4;
                        else if (clickCounter < clickCounterLast) Settings.color_shift_primary -= 4;
                        clickCounterLast = clickCounter;
                        displaybuffer = String(Settings.color_shift_primary).padStart(4, '0');
                        updateAlphaDisplay();
                        colorFill(Wheel(Settings.color_shift_primary));
                        break;
                    case 8: // shift color 2
                        if (clickCounter > clickCounterLast) Settings.color_shift_secondary += 4;
                        else if (clickCounter < clickCounterLast) Settings.color_shift_secondary -= 4;
                        clickCounterLast = clickCounter;
                        displaybuffer = String(Settings.color_shift_secondary).padStart(4, '0');
                        updateAlphaDisplay();
                        colorFill(Wheel(Settings.color_shift_secondary));
                        break;
                    case 9: // fake rpm
                        if (clickCounter > clickCounterLast) {
                            fakeRPM = true;
                            displaybuffer = "YeP ";
                            updateAlphaDisplay();
                            clickCounterLast = clickCounter;
                        } else if (clickCounter < clickCounterLast) {
                            fakeRPM = false;
                            displaybuffer = "NoPe";
                            updateAlphaDisplay();
                            clickCounterLast = clickCounter;
                        }
                        break;
                    case 10: // display style
                        if ((clickCounter < clickCounterLast) && (displayStyle === 1)) {
                            displayStyle = 0;
                            displaybuffer = "Dot ";
                            updateAlphaDisplay();
                            clickCounterLast = clickCounter;
                        }
                        if (((clickCounter > clickCounterLast) && (displayStyle === 0)) || ((clickCounter < clickCounterLast) && (displayStyle === 2))) {
                            displayStyle = 1;
                            displaybuffer = "Bar ";
                            updateAlphaDisplay();
                            clickCounterLast = clickCounter;
                        }
                        if ((clickCounter > clickCounterLast) && (displayStyle === 1)) {
                            displayStyle = 2;
                            displaybuffer = "CinO";
                            updateAlphaDisplay();
                            clickCounterLast = clickCounter;
                        }
                        break;
                    default:
                        clickCounterLast = clickCounter;
                        break;
                }
            }

            // Redraw menu labeling changes
            if (menuState && !setItemState) {
                if (prevSetItemState) {
                    lastMenuPos = -1;
                }
                if (menuPos !== lastMenuPos) {
                    lastMenuPos = menuPos;
                    switch (menuPos) {
                        case 0: displaybuffer = "EXIT"; blackout(); break;
                        case 1: displaybuffer = "Brt "; break;
                        case 2: displaybuffer = "Enbl"; break;
                        case 3: displaybuffer = "Shft"; break;
                        case 4: displaybuffer = "Col1"; break;
                        case 5: displaybuffer = "Col2"; break;
                        case 6: displaybuffer = "Col3"; break;
                        case 7: displaybuffer = "SC 1"; break;
                        case 8: displaybuffer = "SC 2"; break;
                        case 9: displaybuffer = "Fake"; break;
                        case 10: displaybuffer = "StYl"; break;
                        case 11: displaybuffer = "SAVE"; blackout(); break;
                    }
                    updateAlphaDisplay();
                }
            }

            prevSetItemState = setItemState;
        }

        // Output helper for the alphanumeric screen
        function updateAlphaDisplay() {
            alphaDisplay.innerText = displaybuffer;
        }

        function colorFill(color) {
            for (let i = 0; i < numPixels; i++) {
                setPixelColor(i, color);
            }
        }

        // --- REPLICATED LIGHTITUP LOGIC ---
        function lightItUp() {
            let i = 0;
            if (tachDisplay === false) {
                return;
            }
            if (rpm < Settings.enable_rpm) {
                for (i = 0; i < numPixels; i++) {
                    setPixelColor(i, {r:0, g:0, b:0});
                }
                return;
            }

            let c1 = Wheel(Settings.color_primary);
            let c2 = Wheel(Settings.color_secondary);
            let c3 = Wheel(Settings.color_tertiary);

            // Flashing threshold
            if (rpm >= Settings.shift_rpm) {
                let cs1 = Wheel(Settings.color_shift_primary);
                let cs2 = Wheel(Settings.color_shift_secondary);
                let now = Date.now();
                if (now - shiftFlashTime >= 50) { // 50ms flashing frequency
                    shiftFlashTime = now;
                    shiftFlashState = !shiftFlashState;
                    let color = shiftFlashState ? cs1 : cs2;
                    for (i = 0; i < numPixels; i++) {
                        setPixelColor(i, color);
                    }
                }
                return;
            }

            // Calculations based on Display styles
            let dotSize = (Settings.shift_rpm - Settings.enable_rpm) / numPixels;
            let dotCount = Math.floor((rpm - Settings.enable_rpm) / dotSize);

            switch (displayStyle) {
                case 0: // DOT
                    for (i = 0; i < numPixels; i++) {
                        setPixelColor(i, {r:0, g:0, b:0});
                    }
                    if (dotCount < 12) {
                        setPixelColor(dotCount, c1);
                    } else if (dotCount < 20) {
                        setPixelColor(dotCount, c2);
                    } else if (dotCount < 24) {
                        setPixelColor(dotCount, c3);
                    }
                    break;
                case 1: // BAR
                    for (i = 0; i < numPixels; i++) {
                        setPixelColor(i, {r:0, g:0, b:0});
                    }
                    for (i = 0; i < dotCount; i++) {
                        if (i < 12) {
                            setPixelColor(i, c1);
                        } else if (i < 20) {
                            setPixelColor(i, c2);
                        } else {
                            setPixelColor(i, c3);
                        }
                    }
                    break;
                case 2: // CENTER-OUT (CinO)
                    dotSize = (Settings.shift_rpm - Settings.enable_rpm) / (numPixels / 2);
                    dotCount = Math.floor(((rpm - Settings.enable_rpm) / dotSize)) + 12;
                    for (i = 0; i < numPixels; i++) {
                        setPixelColor(i, {r:0, g:0, b:0});
                    }
                    for (i = 12; i < dotCount; i++) {
                        let color;
                        if (i < 17) {
                            color = c1;
                        } else if (i < 21) {
                            color = c2;
                        } else {
                            color = c3;
                        }
                        setPixelColor(i, color);
                        setPixelColor(23 - i, color);
                    }
                    break;
            }
        }

        // --- USER INTERFACE SIMULATOR HANDLERS ---
        
        // Simulates push button clicks (AceButton events)
        pushBtn.addEventListener('click', () => {
            writeSerial("AceButton: Click Detected!");
            if (menuState && setItemState) {
                setItemState = false;
                if (menuPos === 0) {
                    menuState = false;
                    writeSerial("Exit Menu");
                } else if (menuPos === 11) {
                    menuState = false;
                    writeSerial("EEPROM Saving Mocked...");
                    // Simulated visual flash for save action
                    displaybuffer = "SAVE";
                    updateAlphaDisplay();
                }
            } else if (menuState && !setItemState) {
                setItemState = true;
                writeSerial(`Setting Mode for Menu Position ${menuPos} Selected`);
            } else {
                menuState = true;
                lastMenuPos = -1; // force label redraw on menu entry
                writeSerial("Entered Setup Menu");
            }
        });

        // Simulates Encoder rotations (Rotary Library callbacks)
        rotCw.addEventListener('click', () => {
            clickCounter--;
            fakeRpmCounter -= 100;
            writeSerial("Encoder Rotated: CW [clickCounter=" + clickCounter + "]");
        });

        rotCcw.addEventListener('click', () => {
            clickCounter++;
            fakeRpmCounter += 100;
            writeSerial("Encoder Rotated: CCW [clickCounter=" + clickCounter + "]");
        });

        // Update Slider GUI output
        rpmSlider.addEventListener('input', (e) => {
            rpmValue.innerText = `${e.target.value} RPM`;
        });

        // --- SYSTEM BOOT ---
        writeSerial("EEPROM values loaded.");
        writeSerial("Display state: 'boot' initialized.");
        
        // Match setup animations
        setTimeout(() => {
            displaybuffer = "0000";
            updateAlphaDisplay();
            writeSerial("Tachometer ready to read pin signals.");
            // Run loop update ticks every 20ms
            setInterval(loop, 20);
        }, 1500);

    </script>
</body>
</html>
